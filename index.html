<button onclick="toggleTheme()">切换主题</button>
<button onclick="changeTitle()">切换标题</button>

<script>
    let isDark = false;
    function toggleTheme() {
        isDark = !isDark;
        if (isDark) {
            document.body.style.backgroundColor = "#2c3e50";
            document.body.style.color = "#ecf0f1";
            document.querySelectorAll('ul').forEach(ul => {
                ul.style.backgroundColor = "#1a2a3a";
            });
        } else {
            document.body.style.backgroundColor = "#e1cb98";
            document.body.style.color = "#3c4357";
            document.querySelectorAll('ul').forEach(ul => {
                ul.style.backgroundColor = "#dfc3c3";
            });
        }
    }
</script>

<script>
let isChanged = false;
function changeTitle() {
    isChanged = !isChanged;
    const title = document.getElementById('title');
    if (isChanged) {
        title.textContent = '你好！';
    } else {
        title.textContent = '你好，小深！';
    }
}
</script>

</body>
</html>
